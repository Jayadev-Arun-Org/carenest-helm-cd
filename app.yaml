apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: carenest-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Jayadev-Arun-Org/carenest-helm-cd.git'
    path: carenest
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: carenest-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
