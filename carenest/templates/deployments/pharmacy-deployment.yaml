apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-deployment
  namespace: carenest-dev
  labels:
    app: pharmacy-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pharmacy-service
  template:
    metadata:
      labels:
        app: pharmacy-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: carenest-sa
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: wait-for-cosmos
        image: busybox:1.35
        command: ['sh', '-c', 'until nslookup jd-carenest-new-cosmos.mongo.cosmos.azure.com; do echo waiting for cosmos; sleep 2; done;']
      containers:
      - name: pharmacy-service
        image: {{ .Values.images.pharmacy }}
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 5
        envFrom:
        - secretRef:
            name: carenest-secrets
        - configMapRef:
            name: app-config
        
        
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "jd-carenest-new-kv-secrets"


