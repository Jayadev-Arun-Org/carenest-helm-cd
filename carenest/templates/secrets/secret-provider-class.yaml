apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: jd-carenest-new-kv-secrets
  namespace: carenest-dev
spec:
  provider: azure
  secretObjects:
  - secretName: carenest-secrets
    type: Opaque
    data:
    - objectName: cosmos-connection-string
      key: MONGO_URI
    - objectName: cosmos-connection-string
      key: MONGODB_URI
    - objectName: storage-connection-string
      key: STORAGE_CONNECTION_STRING
    - objectName: servicebus-connection-string
      key: SERVICEBUS_CONNECTION_STRING
    - objectName: openai-api-key
      key: AZURE_OPENAI_KEY
    - objectName: openai-endpoint
      key: AZURE_OPENAI_ENDPOINT
    - objectName: language-api-key
      key: AZURE_LANGUAGE_KEY
    - objectName: language-endpoint
      key: AZURE_LANGUAGE_ENDPOINT
    - objectName: jwt-secret
      key: JWT_SECRET
    - objectName: jwt-expires-in
      key: JWT_EXPIRES_IN
    - objectName: openai-api-key
      key: OPENAI_API_KEY
    - objectName: langfuse-public-key
      key: LANGFUSE_PUBLIC_KEY
    - objectName: langfuse-secret-key
      key: LANGFUSE_SECRET_KEY
    - objectName: smtp-password
      key: SMTP_PASSWORD
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "1bf79426-c79d-4c0f-8e9e-8a2bd41ccb0b"
    keyvaultName: "jd-carenest-new-kv"
    objects: |
      array:
        - |
          objectName: cosmos-connection-string
          objectType: secret
        - |
          objectName: storage-connection-string
          objectType: secret
        - |
          objectName: servicebus-connection-string
          objectType: secret
        - |
          objectName: openai-api-key
          objectType: secret
        - |
          objectName: openai-endpoint
          objectType: secret
        - |
          objectName: language-api-key
          objectType: secret
        - |
          objectName: language-endpoint
          objectType: secret
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: jwt-expires-in
          objectType: secret
        - |
          objectName: langfuse-public-key
          objectType: secret
        - |
          objectName: langfuse-secret-key
          objectType: secret
        - |
          objectName: smtp-password
          objectType: secret
    tenantId: "c0175156-9f9f-41ce-9694-2ad94cef2810"
